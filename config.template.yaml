# EEI Namespace Configuration
# Shared across all EEI expansion packs
# Generated by setup.sh — edit project-specific values below

# --- Project-Specific (edit these) ---
project_name: "{{PROJECT_NAME}}"
user_name: "{{USER_NAME}}"
user_skill_level: "{{USER_SKILL_LEVEL}}"
communication_language: "{{COMMUNICATION_LANGUAGE}}"
document_output_language: "{{DOCUMENT_OUTPUT_LANGUAGE}}"
output_folder: _bmad-output
planning_artifacts: "{project-root}/_bmad-output/planning-artifacts"
implementation_artifacts: "{project-root}/_bmad-output/implementation-artifacts"

# Governance Files (edit paths if your project uses different locations)
assumptions_file: "{project-root}/assumptions.md"
decisions_file: "{project-root}/decisions.md"
project_manifest: "{project-root}/BUSINESS_PLAN.md"
reference_documents: "{project-root}/references"

# Research Enforcement
# strict: CRITICAL and MAJOR substantiation gaps must be resolved via /deep-research or /guided-exploration before artifact advances past REVISED
# standard: CRITICAL gaps flagged as WARNING at REVISED transition; all gaps reported at assembly (step 13)
# permissive: all gaps may be tagged NEEDS-RESEARCH; reported at assembly only
research_enforcement: "{{RESEARCH_ENFORCEMENT}}"

# Research Integration (edit glob patterns for your project's research location)
research_paths:
  - "{project-root}/docs/research/*/report-*.md"
  - "{project-root}/docs/research/*/exploration-report.md"
  - "{project-root}/docs/plans/*-playbook.md"

# --- Extension Defaults (normally no need to edit) ---
lifecycle_status: "{run_dir}/lifecycle-status.yaml"
persona_grid: "{project-root}/_bmad/eei/business-plan/config/persona-grid.yaml"
critique_agent: "{project-root}/_bmad/eei/business-plan/agents/critique-agent.md"
lifecycle_module: "{project-root}/_bmad/eei/business-plan/workflows/create-business-plan/lifecycle.md"
consistency_review: "{project-root}/_bmad/eei/business-plan/workflows/create-business-plan/consistency-review.md"
glossary_template: "{project-root}/_bmad/eei/business-plan/templates/glossary.template.yaml"
gap_analysis_template: "{project-root}/_bmad/eei/business-plan/templates/gap-analysis.template.md"
section_topic_map: "{project-root}/_bmad/eei/business-plan/config/section-topic-map.yaml"
playbook_css_template: "{project-root}/_bmad/eei/business-plan/templates/playbook-style.template.css"
exploration_css_template: "{project-root}/_bmad/eei/business-plan/templates/exploration-style.template.css"
research_css_template: "{project-root}/_bmad/eei/business-plan/templates/research-style.template.css"
