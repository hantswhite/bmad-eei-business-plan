# Glossary Template — Common Business Plan Terms
#
# Used by step-13 assembly to auto-generate a terminology appendix.
# Agents scan artifacts for these terms and include only those actually used.
# Add project-specific terms under the "project" section.
#
# Categories:
#   financial  — financial metrics and accounting terms
#   strategy   — strategic frameworks and business concepts
#   operations — operational and organizational terms
#   market     — market analysis and sizing terms
#   project    — project-specific terms (added during workflow)

terms:

  # Financial
  EBITDA:
    expansion: "Earnings Before Interest, Taxes, Depreciation, and Amortization"
    definition: "A measure of operating profitability that excludes non-cash charges and capital structure effects."
    category: financial

  MOIC:
    expansion: "Multiple on Invested Capital"
    definition: "Total value returned to investors divided by total capital invested; measures absolute return regardless of time."
    category: financial

  IRR:
    expansion: "Internal Rate of Return"
    definition: "The annualized rate of return that makes the net present value of all cash flows equal to zero."
    category: financial

  FCF:
    expansion: "Free Cash Flow"
    definition: "Cash generated by operations minus capital expenditures; the cash available for distribution, debt repayment, or reinvestment."
    category: financial

  GM:
    expansion: "Gross Margin"
    definition: "Revenue minus cost of goods sold, expressed as a percentage of revenue."
    category: financial

  EV:
    expansion: "Enterprise Value"
    definition: "Total value of a business including equity and debt, minus cash — the theoretical acquisition price."
    category: financial

  NRR:
    expansion: "Net Revenue Retention"
    definition: "Percentage of recurring revenue retained from existing customers after churn and expansion; above 100% means existing customers grow faster than they leave."
    category: financial

  LTV:
    expansion: "Lifetime Value"
    definition: "The total revenue expected from a customer over the full duration of the relationship."
    category: financial

  CAC:
    expansion: "Customer Acquisition Cost"
    definition: "Total cost of acquiring a new customer, including marketing, sales, and onboarding expenses."
    category: financial

  RPE:
    expansion: "Revenue Per Employee"
    definition: "Total revenue divided by headcount; a measure of workforce productivity."
    category: financial

  CAGR:
    expansion: "Compound Annual Growth Rate"
    definition: "The annualized average rate of growth between two points in time, smoothing out volatility."
    category: financial

  SBA:
    expansion: "Small Business Administration"
    definition: "A US federal agency that provides loan guarantees and resources to small businesses; SBA loans carry specific restrictions on deal structure and pace."
    category: financial

  # Strategy
  PE:
    expansion: "Private Equity"
    definition: "Investment firms that acquire companies using a combination of equity and debt, typically targeting operational improvements and eventual resale."
    category: strategy

  VRIO:
    expansion: "Value, Rarity, Imitability, Organization"
    definition: "A framework for evaluating whether a resource can deliver sustained competitive advantage."
    category: strategy

  PESTEL:
    expansion: "Political, Economic, Social, Technological, Environmental, Legal"
    definition: "A macro-environmental analysis framework that identifies external factors affecting an industry or market."
    category: strategy

  JTBD:
    expansion: "Jobs to Be Done"
    definition: "A framework that defines customer needs as functional, emotional, and social 'jobs' they hire products or services to accomplish."
    category: strategy

  TAM:
    expansion: "Total Addressable Market"
    definition: "The total revenue opportunity available if a product or service achieved 100% market share."
    category: strategy

  SAM:
    expansion: "Serviceable Addressable Market"
    definition: "The portion of the TAM that a company can realistically reach with its current business model and go-to-market approach."
    category: strategy

  SOM:
    expansion: "Serviceable Obtainable Market"
    definition: "The portion of the SAM that a company can capture in the near term given current resources and competition."
    category: strategy

  BMC:
    expansion: "Business Model Canvas"
    definition: "A one-page strategic tool that maps nine building blocks of a business model: value propositions, customer segments, channels, relationships, revenue streams, key resources, key activities, key partners, and cost structure."
    category: strategy

  GTM:
    expansion: "Go-to-Market"
    definition: "The strategy and plan for launching a product or service to customers, including channels, messaging, and sales approach."
    category: strategy

  # Operations
  CPA:
    expansion: "Certified Public Accountant"
    definition: "A licensed accounting professional authorized to perform audits, tax preparation, and advisory services."
    category: operations

  EA:
    expansion: "Enrolled Agent"
    definition: "An IRS-authorized tax practitioner who can represent taxpayers before the IRS; licensed federally rather than by state."
    category: operations

  CAS:
    expansion: "Client Advisory Services"
    definition: "Proactive financial advisory services (beyond compliance) that accounting firms offer to help clients make better business decisions."
    category: operations

  CFO:
    expansion: "Chief Financial Officer"
    definition: "The senior executive responsible for financial planning, risk management, and financial reporting."
    category: operations

  AI:
    expansion: "Artificial Intelligence"
    definition: "Technology that enables machines to perform tasks requiring human-like reasoning, learning, or decision-making."
    category: operations

  # Market
  SMB:
    expansion: "Small and Mid-Size Business"
    definition: "Businesses typically ranging from $1M to $50M in annual revenue, often owner-operated with limited back-office infrastructure."
    category: market

  IPA:
    expansion: "Inside Public Accounting"
    definition: "An industry publication and benchmarking organization that surveys accounting firms on financial and operational performance."
    category: market

  AICPA:
    expansion: "American Institute of Certified Public Accountants"
    definition: "The national professional organization for CPAs in the United States, setting ethical standards, auditing standards, and conducting industry research."
    category: market

  NASBA:
    expansion: "National Association of State Boards of Accountancy"
    definition: "The organization coordinating CPA licensing requirements across US states and territories."
    category: market

  PEEC:
    expansion: "Professional Ethics Executive Committee"
    definition: "The AICPA committee responsible for setting ethical standards for CPAs, including rules on alternative practice structures and non-CPA ownership."
    category: market

  # M&A / Deal Terms
  bolt-on:
    definition: "A small acquisition added to an existing platform company, typically sharing infrastructure and management while contributing incremental revenue."
    category: project

  tuck-in:
    definition: "An acquisition that is absorbed into the existing operations of the acquiring company, often involving a specialist who brings their client book."
    category: project

  roll-up:
    definition: "A growth strategy that acquires multiple small companies in the same industry and consolidates them into a single, larger platform."
    category: project

  platform acquisition:
    definition: "The initial, anchor acquisition in a roll-up strategy that provides the operational foundation (staff, systems, client base) for subsequent bolt-on acquisitions."
    category: project

  seller carry:
    definition: "A portion of the purchase price that the seller finances, paid back over time — aligns the seller's incentive with successful transition."
    category: project

  equity roll:
    definition: "When a seller converts part of their sale proceeds into equity in the acquiring company, maintaining economic interest in the combined entity."
    category: project

  earnout:
    definition: "A contingent payment to the seller based on post-acquisition performance targets; transfers risk to the seller and often creates misaligned incentives."
    category: project

  warm handoff:
    definition: "A structured client transition where the retiring practitioner personally introduces and endorses the new service provider, preserving trust and retention."
    category: project

  deal cadence:
    definition: "The pace at which acquisitions are executed — e.g., '3 deals per year' — governed by integration capacity and available capital."
    category: project

  milestone gate:
    definition: "A predefined checkpoint (G1, G2, G3, G4) where actual performance metrics must meet thresholds before the acquisition pace accelerates."
    category: project
